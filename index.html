<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный экзамен</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif;
            background: url('https://raw.githubusercontent.com/Runny1975/Music-test/main/assets/background.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz {
            width: 92%;
            max-width: 500px;
            padding: 25px;
            /* Прозрачный фон с размытием */
            background: transparent;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            /* Поднял блок выше на 2 см (примерно 75-80px) */
            margin-top: -80px; 
            box-sizing: border-box;
            text-align: center;
        }

        #timer-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            border-radius: 3px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: #b22222;
            transition: width 1s linear;
        }

        .question {
            /* Уменьшенный шрифт для смартфонов */
            font-size: 20px; 
            font-weight: bold;
            margin-bottom: 20px;
            color: #000;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            /* Шрифт ответов оставил крупным */
            font-size: 18px; 
            font-family: inherit;
            transition: 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.5);
        }

        .selected-correct {
            background: rgba(46, 204, 113, 0.6) !important;
            border-color: #2ecc71;
        }

        .selected-wrong {
            background: rgba(231, 76, 60, 0.6) !important;
            border-color: #e74c3c;
        }

        #next {
            margin: 15px auto 0 auto; /* Центрируем кнопку */
            padding: 12px 30px;
            display: none;
            background: rgba(245, 245, 220, 0.4); 
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        #audio {
            width: 100%;
            margin-bottom: 15px;
        }
    </style>
</head>

    { q: "В каком виде минора повышаются VI и VII ступени при движении вверх?", options: ["Мелодический", "Гармонический", "Натуральный", "Фригийский", "Лидийский"], correct: 0 },
    { q: "Какое произведение Комитаса является вершиной армянской литургии?", options: ["Патараг", "Крунк", "Антуни", "Какавик"], correct: 0 },
    { q: "Какой лад отличается от натурального мажора высокой IV ступенью?", options: ["Лидийский", "Миксолидийский", "Дорийский", "Фригийский", "Локрийский"], correct: 0 },
    { q: "Какой лад отличается от натурального минора высокой VI ступенью?", options: ["Дорийский", "Фригийский", "Эолийский", "Локрийский", "Миксолидийский"], correct: 0 },
    { q: "Какой лад отличается от натурального минора низкой II ступенью?", options: ["Фригийский", "Дорийский", "Локрийский", "Эолийский", "Лидийский"], correct: 0 },
    { q: "Лад, в котором все звуки идут по целым тонам?", options: ["Целотоновый", "Хроматический", "Пентатоника", "Уменьшенный", "Мажорный"], correct: 0 },
    { q: "Какой старинный лад совпадает с натуральным минором?", options: ["Эолийский", "Ионийский", "Дорийский", "Фригийский", "Локрийский"], correct: 0 },
    { q: "Кто написал музыку к фильму С. Параджанова 'Цвет граната'?", options: ["Тигран Мансурян", "Арам Хачатурян", "Арно Бабаджанян", "Авет Тертерян"], correct: 0 },
    { q: "Как называется звукоряд, состоящий только из полутонов?", options: ["Хроматический", "Целотоновый", "Пентатоника", "Диатонический", "Яванский"], correct: 0 },
    { q: "К какому наклонению относится дорийский лад?", options: ["Минор", "Мажор", "Смешанный", "Атональный", "Переменный"], correct: 0 },
    { q: "Мажорный лад с пониженной VI и VII ступенями вниз?", options: ["Мелодический мажор", "Гармонический мажор", "Натуральный мажор", "Лидийский мажор", "Дорийский мажор"], correct: 0 },
    { q: "Какой лад часто используется в армянской народной музыке?", options: ["Дважды гармонический минор", "Пентатоника", "Локрийский", "Целотоновый", "Лидийский"], correct: 0 },
    { q: "Что такое 'параллельные лады'?", options: ["Мажор и минор с одинаковыми ключевыми знаками", "Лады с одинаковой тоникой", "Лады с разным темпом", "Лады одного композитора", "Звукоряды в разных октавах"], correct: 0 }
];

const state = {
    index: 0,
    score: 0,
    locked: false,
    timer: null,
    timeLeft: 30
};

const qText = document.getElementById('question');
const answers = document.getElementById('answers');
const nextBtn = document.getElementById('next');
const audio = document.getElementById('audio');
const timerBar = document.getElementById('timer-bar');

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function startTimer() {
    state.timeLeft = 30;
    updateTimerBar();
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        state.timeLeft--;
        updateTimerBar();
        if (state.timeLeft <= 0) {
            clearInterval(state.timer);
            timeOut();
        }
    }, 1000);
}

function updateTimerBar() {
    const width = (state.timeLeft / 30) * 100;
    timerBar.style.width = width + "%";
}

function timeOut() {
    if (state.locked) return;
    state.locked = true;
    qText.innerHTML = `<span style="color:#b22222;">ВРЕМЯ ВЫШЛО!</span>`;
    showCorrectHint();
    nextBtn.style.display = 'block';
}

function showCorrectHint() {
    document.querySelectorAll('.btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.correct === "true") {
            b.classList.add('selected-correct');
        }
    });
}

function showQuestion() {
    state.locked = false;
    startTimer();

    const q = questions[state.index];
    qText.innerText = `${state.index + 1}/${questions.length} — ${q.q}`;
    answers.innerHTML = '';
    nextBtn.style.display = 'none';

    if (q.audio) {
        audio.src = q.audio;
        audio.style.display = 'block';
        audio.currentTime = 0;
    } else {
        audio.pause();
        audio.style.display = 'none';
    }

    let opts = q.options.map((text, i) => ({
        text,
        correct: i === q.correct
    }));

    shuffle(opts);

    opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerText = o.text;
        btn.dataset.correct = o.correct;
        btn.onclick = () => selectAnswer(btn);
        answers.appendChild(btn);
    });
}

function selectAnswer(btn) {
    if (state.locked) return;
    state.locked = true;
    clearInterval(state.timer);

    const correct = btn.dataset.correct === "true";

    // Возвращаем подсказку: подсвечиваем правильный всегда
    showCorrectHint();

    if (!correct) {
        btn.classList.add('selected-wrong');
    } else {
        state.score++;
    }

    nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
    state.index++;
    if (state.index < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
};

function showResult() {
    clearInterval(state.timer);
    document.getElementById('timer-container').style.display = 'none';
    
    const score = state.score;
    let finalBg = "";
    let finalMessage = "";

    // Логика распределения результатов
    if (score >= 0 && score < 70) {
        finalBg = "url('assets/background.png')";
        finalMessage = "Ваших знаний не достаточно. Вам ещё многому нужно учиться";
    } else if (score >= 70 && score < 85) {
        finalBg = "url('assets/background2.jpg')";
        finalMessage = "Ваши знания на уровне музыкальной школы. Для поступления в колледж их недостаточно";
    } else if (score >= 85 && score < 98) {
        finalBg = "url('assets/background3.jpg')";
        finalMessage = "Вы неплохо знаете общую теорию музыки и можете поступать в музыкальный колледж на платный курс";
    } else if (score >= 98 && score <= 100) {
        finalBg = "url('assets/background4.jpg')";
        finalMessage = "Поздравляю! Вы прошли тест-экзамен для поступления на бюджетный курс музыкального колледжа";
    }

    // Меняем фон всей страницы
    document.body.style.backgroundImage = finalBg;
    document.body.style.backgroundSize = "cover"; // Гарантируем, что картинка растянется

    qText.innerText = "Результат экзамена";
    
    // Выводим сообщение и счет
    answers.innerHTML = `
        <div style="font-size:22px; margin-bottom:20px; font-weight:bold; color:#000; line-height:1.4;">
            ${finalMessage}
        </div>
        <div style="font-size:40px; margin-bottom:10px;">${score} / ${questions.length}</div>
        <button onclick="location.reload()" class="btn" style="background:#000; color:#fff;">Начать заново</button>
    `;

    nextBtn.style.display = 'none';
    audio.style.display = 'none';
}

shuffle(questions);
showQuestion();
</script>
